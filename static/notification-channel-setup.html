<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>通知渠道扫码配置</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f5f7fb; color: #1f2937; }
    .setup-shell { max-width: 560px; margin: 0 auto; padding: 22px 14px 32px; }
    .setup-header {
      padding: 22px 18px;
      border-radius: 10px;
      background: #14532d;
      color: #fff;
      box-shadow: 0 8px 22px rgba(20, 83, 45, 0.16);
    }
    .setup-card {
      margin-top: 16px;
      border: 0;
      border-radius: 10px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
    }
    .form-label { font-weight: 600; }
    .small-help { color: #6b7280; font-size: 0.86rem; }
  </style>
</head>
<body>
  <main class="setup-shell">
    <section class="setup-header">
      <div class="d-flex align-items-center gap-3">
        <i class="bi bi-bell fs-2"></i>
        <div>
          <h1 class="h4 mb-1">通知渠道配置</h1>
          <div class="opacity-75">填写后会自动保存到闲鱼管理后台。</div>
        </div>
      </div>
    </section>

    <div id="setupStatus" class="alert alert-info setup-card mb-0">正在校验配置链接...</div>

    <section id="setupFormCard" class="card setup-card d-none">
      <div class="card-body">
        <form id="setupForm">
          <div class="mb-3">
            <label for="channelType" class="form-label">通知渠道</label>
            <select id="channelType" class="form-select" required>
              <option value="feishu">飞书通知</option>
              <option value="dingtalk">钉钉通知</option>
              <option value="wechat">企业微信通知</option>
              <option value="bark">Bark 通知</option>
              <option value="webhook">Webhook 通知</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="channelName" class="form-label">渠道名称</label>
            <input id="channelName" class="form-control" type="text" maxlength="60" placeholder="例如：手机飞书通知">
            <div class="small-help mt-1">不填写时会使用渠道默认名称。</div>
          </div>

          <div id="dynamicFields"></div>

          <div class="form-check form-switch mb-4">
            <input class="form-check-input" type="checkbox" id="sendTest" checked>
            <label class="form-check-label" for="sendTest">保存后发送一条测试通知</label>
          </div>

          <button id="submitBtn" type="submit" class="btn btn-success w-100">
            <i class="bi bi-check-circle me-1"></i>保存通知渠道
          </button>
        </form>
      </div>
    </section>
  </main>

  <script>
    const token = new URLSearchParams(window.location.search).get('token') || '';
    const setupStatus = document.getElementById('setupStatus');
    const setupFormCard = document.getElementById('setupFormCard');
    const channelType = document.getElementById('channelType');
    const dynamicFields = document.getElementById('dynamicFields');
    const submitBtn = document.getElementById('submitBtn');

    const text = {
      missingToken: '配置链接缺少 token，请重新在后台生成二维码。',
      invalidToken: '配置链接不存在、已过期或已使用，请回到后台重新生成二维码。',
      saving: '保存中...',
      saveFailed: '保存失败',
      saveRetry: '保存失败，请检查配置后重试。',
      saveButton: '保存通知渠道',
      saveSuccess: '通知渠道已保存成功。',
      testSent: '测试通知已发送。',
      testFailed: '测试通知发送失败，但配置已保存。'
    };

    const fieldSets = {
      feishu: [
        { id: 'webhook_url', label: '飞书机器人 Webhook URL', type: 'url', required: true, placeholder: 'https://open.feishu.cn/open-apis/bot/v2/hook/...' },
        { id: 'secret', label: '签名密钥（可选）', type: 'password', required: false, placeholder: '飞书机器人安全设置中的密钥' }
      ],
      dingtalk: [
        { id: 'webhook_url', label: '钉钉机器人 Webhook URL', type: 'url', required: true, placeholder: 'https://oapi.dingtalk.com/robot/send?access_token=...' },
        { id: 'secret', label: '加签密钥（可选）', type: 'password', required: false, placeholder: 'SEC...' }
      ],
      wechat: [
        { id: 'webhook_url', label: '企业微信机器人 Webhook URL', type: 'url', required: true, placeholder: 'https://qyapi.weixin.qq.com/cgi-bin/webhook/send?key=...' }
      ],
      bark: [
        { id: 'device_key', label: 'Bark 设备密钥', type: 'text', required: true, placeholder: 'Bark App 中显示的设备密钥' },
        { id: 'server_url', label: 'Bark 服务器地址（可选）', type: 'url', required: false, placeholder: 'https://api.day.app' },
        { id: 'title', label: '通知标题（可选）', type: 'text', required: false, placeholder: '闲鱼管理系统通知' },
        { id: 'sound', label: '提示音（可选）', type: 'text', required: false, placeholder: 'default' },
        { id: 'group', label: '分组（可选）', type: 'text', required: false, placeholder: 'xianyu' }
      ],
      webhook: [
        { id: 'webhook_url', label: 'Webhook URL', type: 'url', required: true, placeholder: 'https://your-server.com/webhook' },
        { id: 'http_method', label: 'HTTP 方法', type: 'select', required: true, options: ['POST', 'PUT'] },
        { id: 'headers', label: '自定义请求头 JSON（可选）', type: 'textarea', required: false, placeholder: '{"Authorization":"Bearer token"}' }
      ]
    };

    function escapeHtml(value) {
      const div = document.createElement('div');
      div.textContent = value == null ? '' : String(value);
      return div.innerHTML;
    }

    function showStatus(type, message) {
      setupStatus.className = `alert alert-${type} setup-card mb-0`;
      setupStatus.textContent = message;
      setupStatus.classList.remove('d-none');
    }

    function renderFields() {
      const fields = fieldSets[channelType.value] || [];
      dynamicFields.innerHTML = fields.map(field => {
        const id = escapeHtml(field.id);
        const required = field.required ? 'required' : '';
        const requiredMark = field.required ? '<span class="text-danger">*</span>' : '';
        if (field.type === 'select') {
          const options = (field.options || []).map(option => `<option value="${escapeHtml(option)}">${escapeHtml(option)}</option>`).join('');
          return `<div class="mb-3"><label class="form-label" for="${id}">${escapeHtml(field.label)} ${requiredMark}</label><select class="form-select" id="${id}" ${required}>${options}</select></div>`;
        }
        if (field.type === 'textarea') {
          return `<div class="mb-3"><label class="form-label" for="${id}">${escapeHtml(field.label)} ${requiredMark}</label><textarea class="form-control" rows="3" id="${id}" placeholder="${escapeHtml(field.placeholder || '')}" ${required}></textarea></div>`;
        }
        return `<div class="mb-3"><label class="form-label" for="${id}">${escapeHtml(field.label)} ${requiredMark}</label><input class="form-control" type="${escapeHtml(field.type)}" id="${id}" placeholder="${escapeHtml(field.placeholder || '')}" ${required}></div>`;
      }).join('');
    }

    async function validateToken() {
      if (!token) {
        showStatus('danger', text.missingToken);
        return;
      }
      try {
        const response = await fetch(`/api/notification-channel-setup/${encodeURIComponent(token)}`);
        if (!response.ok) throw new Error(await response.text());
        await response.json();
        setupStatus.classList.add('d-none');
        setupFormCard.classList.remove('d-none');
        renderFields();
      } catch (error) {
        showStatus('danger', text.invalidToken);
      }
    }

    document.getElementById('setupForm').addEventListener('submit', async event => {
      event.preventDefault();
      submitBtn.disabled = true;
      submitBtn.innerHTML = `<span class="spinner-border spinner-border-sm me-1"></span>${text.saving}`;

      const config = {};
      (fieldSets[channelType.value] || []).forEach(field => {
        const element = document.getElementById(field.id);
        const value = element ? element.value.trim() : '';
        if (value) config[field.id] = value;
      });

      try {
        const response = await fetch('/api/notification-channel-setup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            token,
            type: channelType.value,
            name: document.getElementById('channelName').value.trim() || `${channelType.options[channelType.selectedIndex].text}`,
            config,
            send_test: document.getElementById('sendTest').checked
          })
        });
        const data = await response.json().catch(() => ({}));
        if (!response.ok) throw new Error(data.detail || text.saveFailed);

        setupFormCard.classList.add('d-none');
        const testText = data.test_sent === true ? text.testSent : data.test_sent === false ? text.testFailed : '';
        showStatus('success', `${text.saveSuccess}${testText}`);
      } catch (error) {
        showStatus('danger', error.message || text.saveRetry);
        submitBtn.disabled = false;
        submitBtn.innerHTML = `<i class="bi bi-check-circle me-1"></i>${text.saveButton}`;
      }
    });

    channelType.addEventListener('change', renderFields);
    validateToken();
  </script>
</body>
</html>
